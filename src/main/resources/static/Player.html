<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokerForge - Play</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #1b1b1b;
            color: #f5f5f5;
            text-align: center;
        }
        header {
            background: #272727;
            padding: 20px;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            padding: 40px;
        }
        .bet-controls {
            margin-top: 30px;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        .call { background: #1d3557; color: white; }
        .raise { background: #e63946; color: white; }
        .fold { background: #6c757d; color: white; }
        .slider {
            width: 60%;
            margin-top: 20px;
        }
        footer {
            background: #272727;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9rem;
        }
        .Table-cards{
            margin-bottom:60px;

        }
        .Player-Cards{
            margin-top:30px;
        }
        .Information-Board{
            color:red;
        }
    </style>
</head>
<body>
<header>
    <h1>PokerForge</h1>
</header>

<div class="container">
    <h2>Poker Table</h2>
   <div class="Table-cards">
       <label>Card1</label>
       <label>Card2</label>
       <label>Card3</label>
       <label>Card4</label>
       <label>Card5</label>
   </div>
    <div class="Information-Board">
        <label>Action</label>
    </div>
    <div class="Player-Cards">
        <label>Card1</label>
        <label>Card2</label>
    </div>
    <p>Use the controls below to manage betting actions.</p>

    <div class="bet-controls">
        <button class="call" oncall="call_request();">Call</button>
        <button class="raise" oncall ="raise_request()">Raise</button>
        <button class="fold" oncall ="fold_request()">Fold</button>
        <button class="Check" oncall ="check_request()">Check</button>
    </div>



    <div class="bet-slider">
        <p>Choose Raise Amount:</p>
        <input type="text" id="bet" placeholder="£"/>
        <input type="range" min="0" max="500" value="50" class="slider" />
    </div>
</div>

<footer>
    <p>&copy; 2025 PokerForge. All rights reserved.</p>
</footer>
</body>
<script>
    function sendAction(type, amount = 0) {
        fetch(`/games/actions`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                playerId: PLAYER_ID,
                type: type,
                amount: amount
            })
        })
            .then(res=>{
                if(!res.ok){
                    throw new Error("Action not allowed");
                }
                return res.json();
            })
            .then(data =>{
                console.log("Action Successful," ,data);
            })
            .catch(error =>{
                console.log(err.message);
            })
    }

    function check_request() {
        sendAction("CHECK",0);
    }


</script>
</html>
