<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokerForge - Play</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #1b1b1b;
            color: #f5f5f5;
            text-align: center;
        }
        header {
            background: #272727;
            padding: 20px;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            padding: 40px;
        }
        .bet-controls {
            margin-top: 30px;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        .call { background: #1d3557; color: white; }
        .raise { background: #e63946; color: white; }
        .fold { background: #6c757d; color: white; }
        .slider {
            width: 60%;
            margin-top: 20px;
        }
        footer {
            background: #272727;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<header>
    <h1>PokerForge</h1>
</header>

<div class="container">
    <h2>Poker Table</h2>
    <p>Use the controls below to manage betting actions.</p>

    <div class="bet-controls">
        <button class="call">Call</button>
        <button class="raise">Raise</button>
        <button class="fold">Fold</button>
    </div>

    <div class="bet-slider">
        <p>Choose Raise Amount:</p>
        <input type="range" min="0" max="500" value="50" class="slider" />
    </div>
</div>

<footer>
    <p>&copy; 2025 PokerForge. All rights reserved.</p>
</footer>
</body>
</html>
