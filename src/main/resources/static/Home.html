<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokerForge - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #1b1b1b;
            color: #f5f5f5;
            text-align: center;
        }
        header {
            background: #272727;
            padding: 20px;
            display: flex;
            justify-content: space-between; /* pushes left and right to edges */
            align-items: center; /* vertically center items */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px; /* space between h1 and nav links */
        }

        nav a {
            color: #f5f5f5;
            text-decoration: none;
            margin-left: 15px;
        }

        .account-btn {
            background: #e63946;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none; /* important for <a> */
            display: inline-block;
        }

        .account-btn:hover {
            background: #b41e2f;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
        }
        .container {
            padding: 40px;
        }
        .btn {
            background: #e63946;
            padding: 12px 24px;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            background: #b41e2f;
        }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <h1>PokerForge</h1>
        <nav>
            <a href="Play.html">Play</a>
            <a href="Home.html">Home</a>
            <a href="Framework.html">Framework</a>
        </nav>
    </div>
    <a href="Account.html" class="account-btn">Account</a>
</header>

<div class="container">
    <p>Welcome to PokerForge — your hub for poker tools, stats, and AI-driven analysis.</p>
    <a href="#" class="btn">Get Started</a>
</div>
<footer>
    <p>This is a work in progess which will be finished one day</p>
    <p>&copy; 2025 PokerForge. All rights reserved.</p>
</footer>
</body>
</html>
