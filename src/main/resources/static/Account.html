<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokerForge - Login</title>
  <style>
    /* === Global Styles === */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #1b1b1b;
      color: #f5f5f5;
      text-align: center;
    }

    /* === Header === */
    header {
      background: #272727;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    nav a {
      color: #f5f5f5;
      text-decoration: none;
      margin-left: 15px;
    }

    .account-btn {
      background: #e63946;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .account-btn:hover {
      background: #b41e2f;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    /* === Container === */
    .container {
      padding: 40px;
    }

    /* === Login Form === */
    .login-container {
      background: #272727;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      margin: 40px auto;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .login-container input[type="email"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .login-btn {
      background: #e63946;
      color: #fff;
    }

    .login-btn:hover {
      background: #b41e2f;
    }

    .create-btn {
      background: #457b9d;
      color: #fff;
    }

    .create-btn:hover {
      background: #1d4e73;
    }

    /* === Footer === */
    footer {
      padding: 20px;
      background: #272727;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>PokerForge</h1>
    <nav>
      <a href="Play.html">Play</a>
      <a href="index.html">Home</a>
      <a href="Framework.html">Framework</a>
    </nav>
  </div>
  <a href="Account.html" class="account-btn">Account</a>
</header>

<div class="container">
  <div class="login-container">
    <h2>Login to PokerForge</h2>
    <form onsubmit="login()">
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit" class="btn login-btn">Login</button>
    </form>


    <form action="CreateAccount.html" method="get">
      <button type="submit" class="btn create-btn">Create Account</button>
    </form>
  </div>
</div>

<footer>
  <p>This is a work in progress which will be finished one day</p>
  <p>&copy; 2025 PokerForge. All rights reserved.</p>
</footer>
<script>
  async function login(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("http://localhost:8080/account/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const success = await response.json();

    if (success) {
      window.location.href = "Dashboard.html";
    } else {
      alert("Invalid email or password");
    }
  }
</script>
</body>


</html>
